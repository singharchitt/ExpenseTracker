<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses — ExpenseTracker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-logo">💳 Expense<span>Tracker</span></div>
    <nav>
        <a class="nav-link" href="index.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <a class="nav-link" href="expenses.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Expenses
        </a>
        <a class="nav-link" href="budgets.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Budgets
        </a>
        <a class="nav-link" href="analytics.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Analytics
        </a>
    </nav>
</aside>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <h1>Expenses</h1>
        <div class="month-bar">
            <select id="selMonth"></select>
            <select id="selYear"></select>
        </div>
    </div>

    <div class="content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <p id="summary" style="color:var(--muted);font-size:.875rem"></p>
            <button class="btn btn-primary" onclick="openAdd()">+ Add Expense</button>
        </div>

        <div class="card" style="padding:0">
            <div id="loadingSpinner" class="spinner"></div>
            <div class="table-wrap" id="tableWrap" style="display:none">
                <table>
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th style="text-align:right">Amount</th>
                        <th style="text-align:right">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
                <div id="emptyMsg" class="empty" style="display:none">No expenses for this month. Add one!</div>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="expenseModal">
    <div class="modal">
        <div class="modal-head">
            <h2 id="modalTitle">Add Expense</h2>
            <button class="modal-close" onclick="closeModal('expenseModal')">✕</button>
        </div>
        <input type="hidden" id="editId" />
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="fTitle" placeholder="e.g. Lunch, Uber ride" />
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Amount *</label>
                <input type="number" id="fAmount" min="0.01" step="0.01" placeholder="0.00" />
            </div>
            <div class="form-group">
                <label>Date *</label>
                <input type="date" id="fDate" />
            </div>
        </div>
        <div class="form-group">
            <label>Category *</label>
            <select id="fCategory"></select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="fDesc" placeholder="Optional note" />
        </div>
        <div class="modal-foot">
            <button class="btn btn-outline" onclick="closeModal('expenseModal')">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveExpense()">Add Expense</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>
    // Populate category dropdown
    document.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('fCategory');
        CATEGORIES.forEach(c => sel.appendChild(new Option(CATEGORY_LABELS[c], c)));

        // Set today's date as default
        document.getElementById('fDate').value = new Date().toISOString().split('T')[0];

        initMonthSelector((m, y) => loadExpenses(m, y));
        loadExpenses(getSelectedMonth(), getSelectedYear());
    });

    async function loadExpenses(month, year) {
        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('tableWrap').style.display = 'none';

        try {
            const expenses = await api.getExpenses({ month, year });
            const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
            document.getElementById('summary').textContent =
                `${expenses.length} expense${expenses.length !== 1 ? 's' : ''} · ${formatCurrency(total)} total`;

            const tbody = document.getElementById('tbody');
            if (expenses.length === 0) {
                tbody.innerHTML = '';
                document.getElementById('emptyMsg').style.display = 'block';
            } else {
                document.getElementById('emptyMsg').style.display = 'none';
                tbody.innerHTML = expenses.map(e => `
          <tr>
            <td>
              <div style="font-weight:500">${e.title}</div>
              ${e.description ? `<div style="font-size:.78rem;color:var(--muted)">${e.description}</div>` : ''}
            </td>
            <td><span class="badge b-${e.category}">${CATEGORY_LABELS[e.category]}</span></td>
            <td style="color:var(--muted)">${formatDate(e.date)}</td>
            <td style="text-align:right;font-weight:600">${formatCurrency(e.amount)}</td>
            <td style="text-align:right">
              <button class="btn btn-outline btn-sm" style="margin-right:6px" onclick='openEdit(${JSON.stringify(e)})'>Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">Delete</button>
            </td>
          </tr>`).join('');
            }
        } catch (err) {
            toast('Failed to load expenses: ' + err.message, 'error');
        } finally {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('tableWrap').style.display = 'block';
        }
    }

    function openAdd() {
        document.getElementById('modalTitle').textContent = 'Add Expense';
        document.getElementById('saveBtn').textContent    = 'Add Expense';
        document.getElementById('editId').value  = '';
        document.getElementById('fTitle').value  = '';
        document.getElementById('fAmount').value = '';
        document.getElementById('fDesc').value   = '';
        document.getElementById('fDate').value   = new Date().toISOString().split('T')[0];
        document.getElementById('fCategory').value = 'FOOD';
        openModal('expenseModal');
    }

    function openEdit(e) {
        document.getElementById('modalTitle').textContent = 'Edit Expense';
        document.getElementById('saveBtn').textContent    = 'Update';
        document.getElementById('editId').value    = e.id;
        document.getElementById('fTitle').value    = e.title;
        document.getElementById('fAmount').value   = e.amount;
        document.getElementById('fDate').value     = e.date;
        document.getElementById('fCategory').value = e.category;
        document.getElementById('fDesc').value     = e.description || '';
        openModal('expenseModal');
    }

    async function saveExpense() {
        const title    = document.getElementById('fTitle').value.trim();
        const amount   = document.getElementById('fAmount').value;
        const date     = document.getElementById('fDate').value;
        const category = document.getElementById('fCategory').value;
        const desc     = document.getElementById('fDesc').value.trim();
        const editId   = document.getElementById('editId').value;

        if (!title || !amount || !date) { toast('Title, amount and date are required', 'error'); return; }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.textContent = 'Saving...';

        try {
            const payload = { title, amount: parseFloat(amount), date, category, description: desc };
            if (editId) {
                await api.updateExpense(editId, payload);
                toast('Expense updated!');
            } else {
                await api.createExpense(payload);
                toast('Expense added!');
            }
            closeModal('expenseModal');
            loadExpenses(getSelectedMonth(), getSelectedYear());
        } catch (err) {
            toast('Error: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = editId ? 'Update' : 'Add Expense';
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Delete this expense?')) return;
        try {
            await api.deleteExpense(id);
            toast('Expense deleted');
            loadExpenses(getSelectedMonth(), getSelectedYear());
        } catch (err) {
            toast('Error: ' + err.message, 'error');
        }
    }
</script>
</body>
</html>
