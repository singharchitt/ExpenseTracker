<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — ExpenseTracker</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:var(--bg); }
        .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
        .auth-logo { font-size:1.5rem; font-weight:700; color:var(--primary); margin-bottom:8px; }
        .auth-logo span { color:var(--text); }
        .auth-subtitle { color:var(--muted); font-size:.9rem; margin-bottom:32px; }
        .auth-tabs { display:flex; gap:0; margin-bottom:28px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .auth-tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:.9rem; font-weight:500; background:transparent; border:none; color:var(--muted); transition:.2s; }
        .auth-tab.active { background:var(--primary); color:#fff; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:.85rem; font-weight:500; margin-bottom:6px; color:var(--text); }
        .form-group input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:.95rem; box-sizing:border-box; outline:none; transition:.2s; }
        .form-group input:focus { border-color:var(--primary); }
        .auth-btn { width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; transition:.2s; }
        .auth-btn:hover { opacity:.9; }
        .auth-btn:disabled { opacity:.6; cursor:not-allowed; }
        .auth-error { background:#fee2e2; color:#dc2626; border-radius:8px; padding:10px 14px; font-size:.875rem; margin-bottom:16px; display:none; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="auth-logo">💳 Expense<span>Tracker</span></div>
    <div class="auth-subtitle">Track your spending, own your finances.</div>

    <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Login</button>
        <button class="auth-tab" onclick="showTab('register')">Register</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@email.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="auth-btn" onclick="handleLogin()">Login</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Archit Singh" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@email.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min 8 characters" />
        </div>
        <button class="auth-btn" onclick="handleRegister()">Create Account</button>
    </div>
</div>

<script>
    // If already logged in, redirect
    if (localStorage.getItem('jwt_token')) {
        window.location.href = 'index.html';
    }

    function showTab(tab) {
        document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.querySelectorAll('.auth-tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        hideError();
    }

    function showError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError() {
        document.getElementById('auth-error').style.display = 'none';
    }

    async function handleLogin() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return showError('Please fill in all fields.');

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) return showError(data.message || 'Invalid email or password.');
            localStorage.setItem('jwt_token', data.token);
            localStorage.setItem('user_name', data.name);
            window.location.href = 'index.html';
        } catch (e) {
            showError('Something went wrong. Is the server running?');
        }
    }

    async function handleRegister() {
        const name     = document.getElementById('regName').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!name || !email || !password) return showError('Please fill in all fields.');
        if (password.length < 8) return showError('Password must be at least 8 characters.');

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            if (!res.ok) return showError(data.message || 'Registration failed.');
            localStorage.setItem('jwt_token', data.token);
            localStorage.setItem('user_name', data.name);
            window.location.href = 'index.html';
        } catch (e) {
            showError('Something went wrong. Is the server running?');
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const loginVisible = document.getElementById('loginForm').style.display !== 'none';
            loginVisible ? handleLogin() : handleRegister();
        }
    });
</script>
</body>
</html>
