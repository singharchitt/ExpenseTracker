# ================================
# Server Configuration
# ================================
server.port=8080

# ================================
# MySQL Database Configuration
# ================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT Configuration
# ================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ================================
# CORS
# ================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ================================
# Logging
# ================================
logging.level.com.org.archit.expensetracker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
